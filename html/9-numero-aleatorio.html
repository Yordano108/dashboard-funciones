<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9. Número Aleatorio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="../img/9.svg" type="image/x-icon">
    <style type="text/tailwindcss">
        .glass-panel {
            background: rgba(44, 51, 51, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 209, 0.15);
        }
    </style>
</head>

<body
    class="bg-gradient-to-tr from-[#2C3333] via-[#0E8388] to-[#00FFD1] text-white p-4 sm:p-8 font-mono min-h-screen flex flex-col items-center justify-center">
    <div class="max-w-2xl w-full glass-panel p-6 sm:p-8 rounded-3xl shadow-2xl text-center">
        <a href="../index.html"
            class="text-[#00FFD1] hover:pl-2 transition-all mb-6 inline-block self-start text-left w-full text-sm sm:text-base">←
            Volver al
            Dashboard</a>
        <h1 class="text-2xl sm:text-3xl font-black text-[#00FFD1] mb-6 border-b border-[#0E8388] pb-2">9. Número
            Aleatorio</h1>

        <p class="text-gray-300 mb-6 font-sans text-xs sm:text-sm">Genera un número entero aleatorio comprendido entre
            <span class="text-[#00FFD1] font-mono font-bold">501</span> y <span
                class="text-[#00FFD1] font-mono font-bold">600</span>.</p>

        <div class="mb-6">
            <button id="generar"
                class="w-full sm:w-auto bg-[#0E8388] hover:bg-[#00FFD1] hover:text-[#2C3333] text-white font-bold px-8 py-4 rounded-xl transition-all cursor-pointer text-sm sm:text-lg shadow-lg shadow-[#0E8388]/20 uppercase tracking-wider">
                Generar Número
            </button>
        </div>

        <div id="resultado"
            class="bg-black/30 p-4 rounded-lg border border-[#0E8388]/20 min-h-[120px] flex items-center justify-center text-center">
        </div>
    </div>

    <script type="module" src="../js/9-numero-aleatorio.js"></script>
</body>

</html>
