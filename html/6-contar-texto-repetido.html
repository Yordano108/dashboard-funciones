<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6. Contar Palabra</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="../img/6.svg" type="image/x-icon">
    <style type="text/tailwindcss">
        .glass-panel {
            background: rgba(44, 51, 51, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 209, 0.15);
        }
    </style>
</head>

<body
    class="bg-gradient-to-tr from-[#2C3333] via-[#0E8388] to-[#00FFD1] text-white p-8 font-mono min-h-screen flex flex-col items-center justify-center">
    <div class="max-w-2xl w-full glass-panel p-8 rounded-3xl shadow-2xl">
        <a href="../index.html" class="text-[#00FFD1] hover:pl-2 transition-all mb-6 inline-block">← Volver al
            Dashboard</a>
        <h1 class="text-3xl font-black text-[#00FFD1] mb-6 border-b border-[#0E8388] pb-2">6. Contar Palabra</h1>

        <div class="mb-6 flex flex-col gap-4">
            <div class="flex flex-col gap-2">
                <label for="texto" class="text-sm text-gray-300 ml-2">Texto largo o párrafo:</label>
                <textarea id="texto" placeholder="Ej. hola mundo adios mundo..." rows="3"
                    class="w-full bg-black/20 border border-[#0E8388]/40 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00FFD1] transition-colors resize-none"></textarea>
            </div>

            <div class="flex gap-3 items-end">
                <div class="flex flex-col gap-2 flex-1">
                    <label for="palabra" class="text-sm text-gray-300 ml-2">Palabra a buscar:</label>
                    <input type="text" id="palabra" placeholder="Ej. mundo"
                        class="w-full bg-black/20 border border-[#0E8388]/40 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00FFD1] transition-colors">
                </div>
                <button id="contar"
                    class="bg-[#0E8388] hover:bg-[#00FFD1] hover:text-[#2C3333] text-white font-bold px-6 py-3 rounded-xl transition-all cursor-pointer h-[50px]">
                    Contar
                </button>
            </div>
        </div>

        <div id="resultado"
            class="bg-black/30 p-4 rounded-lg border border-[#0E8388]/20 min-h-[100px] flex items-center justify-center">
        </div>
    </div>

    <script type="module" src="../js/6-contar-texto-repetido.js"></script>
</body>

</html>
